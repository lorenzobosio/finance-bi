# CI — Finance BI (Phase 0 foundation gate)
#
# Proves the security keystone FND-03 on every push/PR: the service_role key must never
# reach the client bundle. Layers:
#   1. `pnpm lint`  — the ESLint no-restricted-imports / no-restricted-syntax guard
#                     (service module + SUPABASE_SERVICE_ROLE_KEY blocked from client code)
#   2. `pnpm build` — `import "server-only"` would fail the build if the chokepoint leaked
#   3. bundle grep  — the AUTHORITATIVE FND-03 assertion: fail the job if the key NAME or
#                     (when the secret is available) its VALUE appears under .next/static
#   4. `pnpm test`  — Vitest unit suite (allowlist + middleware)
#   5. `pnpm test:rls` — live SQL/RLS assertions (RLS-on-every-table, zero-rows for a
#                     non-allowlisted identity, seed counts) against DATABASE_URL
#
# Secrets are read ONLY from GitHub Actions encrypted secrets and are NEVER echoed.
# The repo holds no secrets in git (.env.local is git-ignored — Plan 00-01).

name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save Hobby CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: lint · build · bundle-grep (FND-03) · test · rls
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Pin pnpm to the version the project runs locally (Plan 00-01: 9.15.9 for Node 20).
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (service_role import + env guard)
        run: pnpm lint

      - name: Build
        # NEXT_PUBLIC_* are needed at build time. SUPABASE_SERVICE_ROLE_KEY is intentionally
        # NOT a NEXT_PUBLIC_* var, so Next never inlines it into the client bundle; it is
        # exported here only so the value-grep step below can prove the value never leaked.
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALLOWED_EMAILS: ${{ secrets.ALLOWED_EMAILS }}
        run: pnpm build

      - name: Assert service_role is NOT in the client bundle (FND-03)
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ ! -d .next/static ]; then
            echo "::error::.next/static not found — did the build run?"; exit 1
          fi

          # (a) The env-var NAME must never appear in any emitted client chunk.
          if grep -rIl --include='*.js' -e 'SUPABASE_SERVICE_ROLE_KEY' .next/static; then
            echo "::error::service_role key NAME leaked into the client bundle (.next/static)"
            exit 1
          fi

          # (b) The literal secret VALUE must never appear (build injects it server-side only).
          #     Gated on the secret being present; -F = fixed string, never echoed.
          if [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            if grep -rIlF "$SUPABASE_SERVICE_ROLE_KEY" .next/static; then
              echo "::error::service_role VALUE leaked into the client bundle (.next/static)"
              exit 1
            fi
          else
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY secret not set — value-grep skipped (name-grep still enforced)"
          fi

          echo "FND-03 OK: no service_role name/value found under .next/static"

      - name: Unit tests (Vitest)
        run: pnpm test

      # Type gate (DSN-06c): a renamed/dropped mart column must fail the BUILD, not silently
      # coerce to `undefined → 0`. `tsc --noEmit` backs the typed-mart contract once
      # `src/lib/database.types.ts` lands (Plan 03-03). Added after `pnpm test`; it does NOT
      # weaken any prior step (lint/build/bundle-grep/test/rls all remain).
      - name: Typecheck (tsc --noEmit)
        run: pnpm typecheck

      # Schema drift gate (DAT-03, D-05). The project HAND-AUTHORS src/lib/database.types.ts (the
      # Supabase CLI is not in the toolchain), so a `git diff` on that file only catches uncommitted
      # working-tree edits — NEVER a live schema rename. `pnpm types:drift` is the real gate: it
      # introspects `information_schema.columns` over DATABASE_URL and fails CI when any declared
      # public.* table / v_* view column is added/removed/renamed or its nullability flips relative
      # to the committed types — so a dropped/renamed mart column can never ship as `undefined → 0`
      # (the DSN-06c failure mode). This ADDS to `pnpm typecheck` above (which proves compile-time
      # column shape); it does NOT weaken any prior step (lint/build/bundle-grep/test/typecheck/rls
      # all remain).
      #
      # Skipped on Dependabot PRs: they run with the read-only Dependabot token and CANNOT see
      # Actions secrets, so DATABASE_URL is absent there by design (same guard as the RLS step).
      # When DATABASE_URL is absent the SCRIPT itself prints a loud `::warning::` and exits 0
      # (warned-skip) rather than hard-failing forks/PRs without the secret — mirroring test:rls.
      - name: Schema drift gate (DAT-03)
        if: github.actor != 'dependabot[bot]'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm types:drift

      - name: Live RLS + seed assertions
        # Skipped on Dependabot PRs: they run with the read-only Dependabot token and CANNOT
        # see Actions secrets (GitHub's secret-exfiltration guard), so DATABASE_URL is absent
        # there by design — failing them would make every dependency PR un-mergeable. The
        # full assertion still runs (and still fails loudly on a missing secret) on every
        # human push/merge, which is where main is actually protected.
        if: github.actor != 'dependabot[bot]'
        # Gated on DATABASE_URL being configured as a repo secret. If absent, the job fails
        # loudly so the missing secret is fixed rather than silently skipping the security check.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL secret is not set — RLS/seed assertions cannot run"
            exit 1
          fi
          pnpm test:rls

  # E2E critical-flow gate (E2E-01/02, D-11/12). Runs Playwright against the Supabase LOCAL STACK
  # (`supabase start` → Postgres + PostgREST + GoTrue in Docker, NO external account and NO repo
  # secret — the app reads via PostgREST over HTTP, which a bare postgres container can't serve;
  # RESEARCH Pitfall 3). The stack is migrated + seeded from the SINGLE PII-free demo generator
  # (`scripts/seed-demo.ts`), then the public-demo build runs against it (the demo path
  # early-returns before Google OAuth and anon RLS caps reads to is_demo=true — Pitfall 4). A
  # failing critical-flow spec FAILS this job; the operator adds `e2e` to the branch-protection
  # required checks so it GATES merges (E2E-02). Needs no repo secret, so it runs on every PR.
  e2e:
    name: e2e · Playwright critical flows (local Supabase stack)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Local read-plane the demo build points at (the ephemeral local-stack ports — NOT production).
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Boot the Supabase local stack (Docker: Postgres + PostgREST + GoTrue). No external account.
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start the Supabase local stack
        run: supabase start

      # Capture the ephemeral local anon key into the env for the demo build. The key is a local,
      # per-run credential (never a production secret — threat T-07-21); masked so it is never
      # printed in the logs. The elevated service-role key is intentionally NOT captured (the E2E
      # render tier never needs it; anon + RLS is the whole point of the no-leak assertion).
      - name: Capture local-stack anon key
        run: |
          set -euo pipefail
          ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')
          if [ -z "$ANON_KEY" ] || [ "$ANON_KEY" = "null" ]; then
            echo "::error::could not read the local-stack ANON_KEY from supabase status"; exit 1
          fi
          echo "::add-mask::$ANON_KEY"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"

      # Apply 0000..0016 to the local stack, then seed the is_demo=true rows from the demo generator.
      - name: Migrate the local stack
        run: pnpm exec drizzle-kit migrate

      - name: Seed the demo dataset (PII-free generator)
        run: pnpm seed:demo

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      # Playwright's webServer builds + starts the public-demo build (the demo-mode flag is set by
      # the webServer in playwright.config.ts; URL + anon key come from the env above), waits on
      # /api/health, then runs the critical-flow suite. A failing critical flow fails the job.
      - name: Run Playwright E2E (critical flows)
        run: pnpm exec playwright test

      - name: Upload the Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
