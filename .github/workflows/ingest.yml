# Daily ingestion cron (ING-02) — the headless Enable Banking pull + the Supabase keep-alive.
#
# Runs `scripts/ingest.ts` (via `pnpm ingest`) once a day, off-peak. Each run signs a 1h
# Enable Banking JWT, pulls new transactions/balances for the synced accounts, upserts them
# idempotently, and ALWAYS writes an `import_batches` heartbeat (the freshness/reconnect
# banners read the latest row — D-13/D-15/D-16). The heartbeat write doubles as the Supabase
# free-tier keep-alive (ING-04).
#
# Fail-soft (NOT a red CI run on the normal lapse path): ingest.ts exits 0 on a 403
# consent-expired (it flags connections.consent_status='expired' so the in-app reconnect
# banner is the alert — never a silent freeze), and exits 1 only on a transient error.
#
# WRITE PLANE: scripts/ingest.ts writes via the `postgres` driver using DATABASE_URL (the
# project's Node-side DB pattern — a direct connection that bypasses RLS, the service_role
# equivalent the cron needs). It does NOT use the Supabase service_role client, so this
# workflow intentionally does NOT reference SUPABASE_SERVICE_ROLE_KEY. The env vars
# ingest.ts actually reads are DATABASE_URL, ENABLE_BANKING_APP_ID, and
# ENABLE_BANKING_PRIVATE_KEY_PATH (a path to the RS256 .pem on disk).
#
# Secrets are read ONLY from GitHub Actions encrypted secrets and are NEVER echoed. The
# private key arrives as the multi-line .pem CONTENT in the ENABLE_BANKING_PRIVATE_KEY
# secret and is written to a runner temp file at runtime (a CI runner has no committed .pem).

name: Daily ingestion

on:
  # FOUR runs/day at ~08:00 / 13:00 / 16:00 / 21:00 Europe/Berlin (Lorenzo). Crons are UTC;
  # in summer (CEST = UTC+2) the local times are exact, in winter (CET = UTC+1) they shift ~1h
  # earlier — harmless for a go-forward pull (D-11). Odd minute avoids the top-of-hour stampede.
  # NOTE: 4×/day sits at the edge of the ~4 EB calls/account/day PSD2 budget; if pulls begin
  # rate-limiting (429), reduce the count — idempotency (dedupe_hash + ON CONFLICT) makes any
  # retried/overlapping pull harmless (zero duplicate rows).
  schedule:
    - cron: "17 6 * * *"   # ~08:17 Berlin (CEST) / 07:17 (CET)
    - cron: "17 11 * * *"  # ~13:17 Berlin (CEST) / 12:17 (CET)
    - cron: "17 14 * * *"  # ~16:17 Berlin (CEST) / 15:17 (CET)
    - cron: "17 19 * * *"  # ~21:17 Berlin (CEST) / 20:17 (CET)
  # Manual trigger for on-demand pulls / first run after a reconnect.
  workflow_dispatch: {}

# One ingestion at a time; never let a manual run race the scheduled run.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    name: Pull Enable Banking transactions (daily)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Pin pnpm to the version the project runs locally (Plan 00-01: 9.15.9 for Node 20).
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The RS256 private key is a GitHub Secret holding the .pem CONTENT (multi-line,
      # preserved by GitHub Secrets). A CI runner has no committed key file, so write it to a
      # private temp file (chmod 600) and hand ingest.ts its PATH. `printf '%s'` writes the
      # value verbatim without echoing it; GitHub masks the secret in any accidental output.
      - name: Materialise the Enable Banking private key
        env:
          ENABLE_BANKING_PRIVATE_KEY: ${{ secrets.ENABLE_BANKING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          printf '%s' "$ENABLE_BANKING_PRIVATE_KEY" > "$RUNNER_TEMP/eb-private-key.pem"
          chmod 600 "$RUNNER_TEMP/eb-private-key.pem"

      - name: Run the daily pull
        # The env vars scripts/ingest.ts actually reads (postgres driver + EB JWT):
        #   DATABASE_URL                   — the direct Postgres connection (write plane)
        #   ENABLE_BANKING_APP_ID          — the JWT `kid` / app credential
        #   ENABLE_BANKING_PRIVATE_KEY_PATH — path to the .pem written in the step above
        # NO secret is echoed; ingest.ts logs only counts/status (V7). It exits 0 on
        # auth_expired (the banner is the alert) and 1 only on a transient error.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENABLE_BANKING_APP_ID: ${{ secrets.ENABLE_BANKING_APP_ID }}
          ENABLE_BANKING_PRIVATE_KEY_PATH: ${{ runner.temp }}/eb-private-key.pem
        run: pnpm ingest

      # Bust the REAL mart cache after a successful pull (OBS-02, D-08) so the dashboard reflects
      # fresh data immediately instead of waiting out the unstable_cache TTL. POSTs the deployed
      # app's shared-secret /api/revalidate, which calls revalidateTag('marts:real') — only the
      # real partition (the demo partition is untouched). NON-FATAL and best-effort: revalidation is
      # an OPTIMIZATION, not correctness (the TTL is the fallback), so a failure here — or missing
      # APP_BASE_URL / REVALIDATE_SECRET — never fails the cron. The secret is never echoed (curl
      # reads it from the env; GitHub masks it in any accidental output).
      - name: Revalidate the mart cache (real partition)
        if: success()
        continue-on-error: true
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          set -uo pipefail
          if [ -z "${APP_BASE_URL:-}" ] || [ -z "${REVALIDATE_SECRET:-}" ]; then
            echo "APP_BASE_URL / REVALIDATE_SECRET not set — skipping cache revalidation (TTL fallback)."
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${REVALIDATE_SECRET}" \
            "${APP_BASE_URL%/}/api/revalidate" || echo "000")
          echo "revalidate -> HTTP ${code}"
